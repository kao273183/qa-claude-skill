<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F2E"/>
      <stop offset="100%" stop-color="#0B0A14"/>
    </linearGradient>
    <linearGradient id="termTitle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3D3D3D"/>
      <stop offset="100%" stop-color="#2D2D2D"/>
    </linearGradient>
  </defs>

  <!-- Outer background -->
  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Hero title -->
  <text x="600" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">✨ One-command install</text>
  <text x="600" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="400" fill="#A78BFA">24 skills installed in ~30 seconds — validate · render · backup · install</text>

  <!-- Terminal window -->
  <g transform="translate(80, 130)">
    <!-- Window frame with shadow -->
    <rect x="0" y="0" width="1040" height="540" rx="10" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="1040" height="32" rx="10" fill="url(#termTitle)"/>
    <rect x="0" y="22" width="1040" height="10" fill="url(#termTitle)"/>

    <!-- Mac dots -->
    <circle cx="20" cy="16" r="6" fill="#FF5F57"/>
    <circle cx="40" cy="16" r="6" fill="#FEBC2E"/>
    <circle cx="60" cy="16" r="6" fill="#28C840"/>

    <!-- Title -->
    <text x="520" y="21" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="500" fill="#A0A0A0">jack@mac · ~/Desktop/QA_Claude_Skill</text>

    <!-- Terminal content (monospace) -->
    <g font-family="'SF Mono', Menlo, Monaco, 'Courier New', monospace" font-size="14">

      <!-- Prompt 1 -->
      <text x="20" y="65" fill="#A78BFA">$ </text>
      <text x="35" y="65" fill="#FFFFFF">cp config/config.example.json config/config.json</text>

      <!-- Prompt 2 -->
      <text x="20" y="92" fill="#A78BFA">$ </text>
      <text x="35" y="92" fill="#FFFFFF">./install.sh</text>

      <!-- Output: validate -->
      <text x="20" y="125" fill="#06B6D4">[INFO]</text>
      <text x="80" y="125" fill="#E0E0E0">Validating config.json (delegating to validate-config.sh) ...</text>

      <text x="20" y="148" fill="#6B7280">── 1. JSON syntax ─────────────────────────────</text>
      <text x="20" y="170" fill="#22C55E">✓ PASS</text>
      <text x="85" y="170" fill="#E0E0E0">JSON syntax valid</text>

      <text x="20" y="193" fill="#6B7280">── 2. Required fields ─────────────────────────</text>
      <text x="20" y="215" fill="#22C55E">✓ PASS</text>
      <text x="85" y="215" fill="#E0E0E0">.mode = "full-mcp"</text>
      <text x="20" y="237" fill="#22C55E">✓ PASS</text>
      <text x="85" y="237" fill="#E0E0E0">.jira.project_key = "PROJ"</text>

      <text x="20" y="260" fill="#6B7280">── 3. Enum values · 4. Patterns · 5. Mode · 6. Cross-field · 7. Recommended</text>
      <text x="20" y="282" fill="#22C55E">✓ All 7 phases passed</text>

      <!-- Install -->
      <text x="20" y="315" fill="#06B6D4">[INFO]</text>
      <text x="80" y="315" fill="#E0E0E0">Will install 24 skills: test-master, bug-report, ...</text>

      <text x="20" y="338" fill="#06B6D4">[INFO]</text>
      <text x="80" y="338" fill="#E0E0E0">Installing test-master ...</text>
      <text x="20" y="360" fill="#06B6D4">[INFO]</text>
      <text x="80" y="360" fill="#E0E0E0">Installing bug-report ...</text>
      <text x="20" y="382" fill="#06B6D4">[INFO]</text>
      <text x="80" y="382" fill="#E0E0E0">Installing performance-test-gen ...</text>
      <text x="20" y="404" fill="#6B7280">           ... 21 more skills ...</text>

      <!-- Success -->
      <text x="20" y="437" fill="#22C55E">✓ OK</text>
      <text x="80" y="437" fill="#FFFFFF" font-weight="600">Installed 24 skills to ~/.claude/skills/</text>

      <text x="20" y="470" fill="#A0A0A0">Next steps:</text>
      <text x="40" y="490" fill="#D4D4D4">1. Restart Claude Code (or /reload-skills)</text>
      <text x="40" y="508" fill="#D4D4D4">2. Try: "Generate test plan for feature X"</text>
    </g>

    <!-- Blinking cursor -->
    <rect x="20" y="528" width="10" height="2" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom stats -->
  <g transform="translate(80, 695)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#A78BFA">📊 24 skills · 0 unresolved variables · 122 files · ready in 30s</text>
    <text x="1040" y="0" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#6B7280">github.com/kao273183/qa-claude-skill</text>
  </g>
</svg>
