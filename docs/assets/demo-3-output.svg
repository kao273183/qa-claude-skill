  <!-- Column 3: Code (pytest) -->
  <g transform="translate(820, 130)">
    <rect x="0" y="0" width="320" height="540" rx="10" fill="#1F1F2A" stroke="#3F3F4F" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="0" width="320" height="44" rx="10" fill="#7C3AED"/>
    <rect x="0" y="34" width="320" height="10" fill="#7C3AED"/>
    <text x="20" y="28" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">🐍 pytest  ·  test_auth_api.py</text>

    <!-- Code content -->
    <g transform="translate(14, 65)" font-family="'SF Mono', Menlo, Monaco, monospace" font-size="11">
      <!-- Line numbers + code -->
      <text x="0" y="14" fill="#6B7280">1</text>
      <text x="20" y="14" fill="#C586C0">def</text>
      <text x="50" y="14" fill="#DCDCAA">test_steps_sync_unauth_rejected</text>

      <text x="0" y="32" fill="#6B7280">2</text>
      <text x="20" y="32" fill="#E0E0E0">    (health_client):</text>

      <text x="0" y="50" fill="#6B7280">3</text>
      <text x="20" y="50" fill="#CE9178">    """</text>

      <text x="0" y="68" fill="#6B7280">4</text>
      <text x="20" y="68" fill="#CE9178">    對應 TC: WB-AUTH-002</text>

      <text x="0" y="86" fill="#6B7280">5</text>
      <text x="20" y="86" fill="#CE9178">    Spec: PROJ-2500</text>

      <text x="0" y="104" fill="#6B7280">6</text>
      <text x="20" y="104" fill="#CE9178">    """</text>

      <text x="0" y="122" fill="#6B7280">7</text>
      <text x="20" y="122" fill="#E0E0E0">    resp = health_client.post(</text>

      <text x="0" y="140" fill="#6B7280">8</text>
      <text x="36" y="140" fill="#CE9178">"/api/v1/auth/login",</text>

      <text x="0" y="158" fill="#6B7280">9</text>
      <text x="36" y="158" fill="#9CDCFE">json</text><text x="65" y="158" fill="#E0E0E0">={</text><text x="85" y="158" fill="#CE9178">"email"</text><text x="125" y="158" fill="#E0E0E0">: ...},</text>

      <text x="0" y="176" fill="#6B7280">10</text>
      <text x="20" y="176" fill="#E0E0E0">    )</text>

      <text x="0" y="194" fill="#6B7280">11</text>
      <text x="20" y="194" fill="#C586C0">    assert</text>
      <text x="78" y="194" fill="#9CDCFE">resp</text><text x="105" y="194" fill="#E0E0E0">.</text><text x="110" y="194" fill="#DCDCAA">status_code</text>

      <text x="0" y="212" fill="#6B7280">12</text>
      <text x="38" y="212" fill="#E0E0E0">== </text><text x="60" y="212" fill="#B5CEA8">401</text>
    </g>

    <!-- Separator -->
    <line x1="14" y1="290" x2="306" y2="290" stroke="#374151" stroke-dasharray="3,3"/>

    <!-- Generated assets summary -->
    <g transform="translate(14, 310)" font-family="-apple-system, BlinkMacSystemFont, sans-serif">
      <text x="0" y="14" font-size="13" font-weight="600" fill="#A78BFA">Generated assets</text>

      <text x="0" y="40" font-size="11" font-weight="600" fill="#E0E0E0">utils/schemas.py</text>
      <text x="0" y="56" font-size="11" fill="#9CA3AF">  + AUTH_LOGIN schema</text>
      <text x="0" y="72" font-size="11" fill="#9CA3AF">  + AUTH_TOKEN_REFRESH schema</text>

      <text x="0" y="98" font-size="11" font-weight="600" fill="#E0E0E0">conftest.py</text>
      <text x="0" y="114" font-size="11" fill="#9CA3AF">  + auth_client fixture</text>
      <text x="0" y="130" font-size="11" fill="#9CA3AF">  + auth_authenticated_client fixture</text>

      <text x="0" y="156" font-size="11" font-weight="600" fill="#E0E0E0">tests/test_auth_api.py</text>
      <text x="0" y="172" font-size="11" fill="#9CA3AF">  + 12 test functions</text>
      <text x="0" y="188" font-size="11" fill="#9CA3AF">  + Bidirectional TC ↔ pytest map</text>

      <line x1="0" y1="200" x2="290" y2="200" stroke="#374151" stroke-dasharray="3,3"/>

      <text x="0" y="220" font-size="11" font-weight="600" fill="#22C55E">✓ pytest collect → 12 tests</text>
      <text x="0" y="236" font-size="11" font-weight="600" fill="#22C55E">✓ Ready for UAT</text>
    </g>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(80, 695)">
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#A78BFA">📦 From "I want to test X" → JIRA + Sheet + pytest in minutes (not hours)</text>
    <text x="1040" y="0" text-anchor="end" font-family="ui-monospace, monospace" font-size="12" fill="#6B7280">github.com/kao273183/qa-claude-skill</text>
  </g>
</svg>
